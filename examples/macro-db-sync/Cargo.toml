[workspace]
resolver = "2"
members = ["schema-hub", "producer", "consumer"]

[workspace.dependencies]
cell-sdk = { path = "../../cell-sdk" }
cell-macros = { path = "../../cell-macros" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
