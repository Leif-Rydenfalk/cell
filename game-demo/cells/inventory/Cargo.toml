[package]
name = "inventory"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
cell-sdk = { path = "../../../cell-sdk" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = { version = "0.30", features = ["bundled"] }
dirs = "5.0"
futures = "0.3"
